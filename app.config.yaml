application:
  actions: actions
  runtimeManifest:
    packages:
      llm-apps:
        license: Apache-2.0
        actions:
          mcp:
            function: actions/mcp/index.js
            web: 'yes'
            runtime: nodejs:18
            limits:
              timeout: 300000
              memory: 512
            inputs:
              LOG_LEVEL: debug
            annotations:
              require-adobe-auth: false
              final: true
              raw-http: true
